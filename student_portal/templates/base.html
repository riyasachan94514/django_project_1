<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Portal{% endblock %}</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/4.24.15/antd.min.css" />
    <style>
        body {
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol';
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
        }
        .layout-wrapper {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .header {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
            color: #1890ff;
        }
        .card-container {
            background: #fff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 12px rGba(0,0,0,0.05);
        }
        .text-success { color: #52c41a; }
        .text-danger { color: #f5222d; }
    </style>
</head>
<body>
    <div class="layout-wrapper">
        <div class="header">
            <h1>🎓 Student Portal</h1>
            {% block header_actions %}{% endblock %}
        </div>
        
        {% if messages %}
        <div style="margin-bottom: 24px;">
            {% for message in messages %}
            <div class="ant-alert ant-alert-success ant-alert-with-description" style="margin-bottom: 16px;">
                <div class="ant-alert-content">
                    <div class="ant-alert-message">{{ message }}</div>
                </div>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <div class="card-container">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
